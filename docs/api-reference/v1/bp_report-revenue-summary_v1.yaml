name: getRevenueSummaryReport
description: Tổng hợp doanh thu bán, thuê, tiền phạt và top truyện theo khoảng thời gian.
version: 0.1.0-blueprint
deprecated: false
status: blueprint
tags: [report, revenue, analytics]
category: report/revenue
priority: medium
doc_ref: bp_report-revenue-summary_v1.md

http:
  method: POST
  path: /api/v1/reports/revenue-summary
  path_params: {}
  query_params: {}
  request_body:
    type: object
  content_type: application/json

parameters:
  type: object
  required: [from_date, to_date, group_by, request_id]
  properties:
    from_date:
      type: string
      format: date-time
    to_date:
      type: string
      format: date-time
    group_by:
      type: string
      enum: [day, week, month]
    include_top_titles:
      type: boolean
      default: true
    include_inventory_alert:
      type: boolean
      default: true
    request_id:
      type: string
      description: Idempotency key.

returns:
  type: object
  properties:
    sell_revenue:
      type: number
    rental_revenue:
      type: number
    penalty_revenue:
      type: number
    total_revenue:
      type: number
    top_sell_titles:
      type: array
      items:
        type: object
    top_rent_titles:
      type: array
      items:
        type: object
    inventory_alerts:
      type: array
      items:
        type: object

behavior:
  deterministic: true
  idempotent: true
  retryable: true
  side_effects: read-only
  latency: medium
  cacheable: true

errors:
  - code: INVALID_DATE_RANGE
    type: ValidationError
    http_status: 400
    description: Khoảng thời gian from_date và to_date không hợp lệ.
  - code: REPORT_RANGE_TOO_LARGE
    type: ValidationError
    http_status: 400
    description: Khoảng thời gian vượt giới hạn cho phép để tổng hợp.
  - code: DATA_SOURCE_LOCKED
    type: LockTimeoutError
    http_status: 423
    description: Dữ liệu báo cáo đang bị lock bởi tác vụ nền.

auth:
  required: true
  type: Bearer Token
  roles: [manager, owner]
  scopes: [report:read]

dependencies:
