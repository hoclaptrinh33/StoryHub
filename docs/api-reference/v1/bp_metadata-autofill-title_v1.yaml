name: autofillTitleMetadata
description: Tự động lấy metadata truyện theo tên hoặc ISBN, ưu tiên cache local và fallback khi nguồn ngoài lỗi.
version: 0.1.0-blueprint
deprecated: false
status: blueprint
tags: [metadata, integration, cache]
category: metadata/autofill
priority: medium
doc_ref: bp_metadata-autofill-title_v1.md

http:
  method: POST
  path: /api/v1/metadata/autofill
  path_params: {}
  query_params: {}
  request_body:
    type: object
  content_type: application/json

parameters:
  type: object
  required: [request_id]
  properties:
    query_text:
      type: string
      description: Tên truyện hoặc từ khóa tìm kiếm.
    isbn:
      type: string
      description: ISBN nếu có.
    force_refresh:
      type: boolean
      description: Bỏ qua cache và gọi lại nguồn ngoài.
      default: false
    request_id:
      type: string
      description: Idempotency key.

returns:
  type: object
  properties:
    source:
      type: string
      enum: [cache, external_api, fallback]
    cache_hit:
      type: boolean
    metadata:
      type: object
      properties:
        name:
          type: string
        author:
          type: string
        publisher:
          type: string
        genre:
          type: string
        description:
          type: string
        cover_url:
          type: string
        confidence:
          type: number

behavior:
  deterministic: true
  idempotent: true
  retryable: true
  side_effects: read-cache-write-cache
  latency: medium
  cacheable: true

errors:
  - code: INVALID_QUERY
    type: ValidationError
    http_status: 400
    description: Thiếu cả query_text và isbn.
  - code: INVALID_ISBN
    type: ValidationError
    http_status: 400
    description: ISBN không hợp lệ.
  - code: EXTERNAL_API_TIMEOUT
    type: TimeoutError
    http_status: 504
    description: Nguồn metadata ngoài phản hồi quá chậm.
  - code: METADATA_NOT_FOUND
    type: NotFoundError
    http_status: 404
    description: Không tìm thấy metadata phù hợp từ mọi nguồn.

auth:
  required: true
  type: Bearer Token
  roles: [cashier, manager]
  scopes: [metadata:read]

dependencies:
  requires:
    [authenticate, metadataCacheLookup, fetchExternalMetadata, sanitizeMetadata]
  provides: [title_metadata_context]
  conflicts_with: []

blueprint_tracking:
  prompt_hash: sha256:39A7AF9101A919D4E08BDE915D0A5E02541CE5904112C4727797B817AAADB8AF
  prompt_summary: Auto-fetch metadata theo tên hoặc ISBN, có cache local và fallback khi API chết.
  assumptions:
    - Hệ thống luôn ưu tiên cache local trước khi gọi nguồn ngoài.
    - Nếu force_refresh=true vẫn phải cập nhật cache mới sau khi gọi thành công.
    - confidence dùng để gợi ý nhân viên cần kiểm tra thủ công.
  confidence: medium
