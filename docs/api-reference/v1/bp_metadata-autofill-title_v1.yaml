  open_questions:
    - Nguồn metadata chính thức sẽ là API nào?
    - TTL cache metadata nên đặt bao lâu?
  acceptance_criteria:
    - Query hợp lệ phải trả metadata hoặc lỗi rõ ràng.
    - Hệ thống hoạt động ổn khi nguồn ngoài bị timeout.
    - Trường source phản ánh đúng kênh dữ liệu thực tế.

testing:
