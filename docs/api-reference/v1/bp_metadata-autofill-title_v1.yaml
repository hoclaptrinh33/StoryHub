      expected_status: 200
    - name: should_fail_when_query_missing
      type: error_case
      auto_generate: true
      input:
        request_id: req-meta-002
      expected_status: 400
      expected_error:
        code: INVALID_QUERY
    - name: should_fail_without_auth
      type: auth_check
      auto_generate: true
      expected_status: 401
  mock:
    enabled: true
    output_path: mocks/bp_metadata-autofill-title_v1.mock.json
    happy_path:
      delay_ms: 160
