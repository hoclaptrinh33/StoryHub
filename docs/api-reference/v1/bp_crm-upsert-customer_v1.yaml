      input:
        phone: "0901234567"
        name: "Nguyen Minh Anh"
        membership_level: gold
        request_id: req-crm-001
      expected_status: 200
    - name: should_fail_with_invalid_phone
      type: error_case
      auto_generate: true
      input:
        phone: "abc"
        name: "Nguyen Minh Anh"
        membership_level: standard
        request_id: req-crm-002
      expected_status: 400
      expected_error:
        code: INVALID_PHONE
    - name: should_fail_without_auth
      type: auth_check
      auto_generate: true
      expected_status: 401
  mock:
    enabled: true
    output_path: mocks/bp_crm-upsert-customer_v1.mock.json
    happy_path:
      delay_ms: 120
      response:
        customer_id: CUS-0001
        phone: "0901234567"
        name: "Nguyen Minh Anh"
        membership_level: gold
        deposit_balance: 500000
        debt: 0
    error_cases:
      - error_code: INVALID_PHONE
        delay_ms: 50
      - error_code: NEGATIVE_BALANCE_NOT_ALLOWED
        delay_ms: 80
      - error_code: BLACKLISTED_CUSTOMER_MUTATION_DENIED
        delay_ms: 90
  frontend_scenarios:
    - scenario: crm_upsert_loading
      description: Nút lưu hiển thị loading khi gửi request.
      mock_config:
