      ui_state: loading
      assertions:
        - save button disabled
        - inline spinner visible
    - scenario: crm_upsert_success
      description: Lưu thành công hiển thị cập nhật số dư mới.
      mock_config:
        status: 200
      ui_state: success
      assertions:
        - success toast visible
        - updated balance shown
    - scenario: crm_invalid_phone_error
      description: Số điện thoại không hợp lệ hiển thị lỗi tại field.
      mock_config:
        status: 400
        error_code: INVALID_PHONE
